publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_svg: ^2.0.10
  riverpod: ^3.2.1
  shared_preferences: ^2.5.5
  carousel_slider: ^5.1.2
